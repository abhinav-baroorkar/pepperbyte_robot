# slam_toolbox online async params — anti-aliasing tuning for multi-room mapping.
# Tuned for PepperByte (RPLidar 12 m, 0.03725 m wheels, indoor featureless spaces).
slam_toolbox:
  ros__parameters:

    # ── Solver ────────────────────────────────────────────────────────────────
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None
    ceres_max_num_iterations: 100       # was default — more iterations → better accuracy

    # ── Frames ────────────────────────────────────────────────────────────────
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_scan_matching: true
    mode: mapping

    # ── Map ───────────────────────────────────────────────────────────────────
    map_update_interval: 5.0
    resolution: 0.05
    max_laser_range: 12.0

    # ── Node creation — more nodes = less drift accumulation ──────────────────
    minimum_travel_distance: 0.05       # was 0.1  — new node every 5 cm
    minimum_travel_heading: 0.0872      # was 0.175 — new node every 5 deg (~π/36)
    minimum_time_interval: 0.3          # force a node at least every 0.3 s

    # ── Scan processing ───────────────────────────────────────────────────────
    use_scan_barycenter: true
    scan_buffer_size: 30                # was 10 — larger history for better local matching
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5

    # ── Correlation search — coarse scan matching window ──────────────────────
    correlation_search_space_dimension: 0.5    # search 0.5 m around odometry estimate
    correlation_search_space_resolution: 0.01  # 1 cm grid resolution
    correlation_search_space_smear_deviation: 0.1

    # ── Loop closure ──────────────────────────────────────────────────────────
    do_loop_closing: true
    loop_search_maximum_distance: 8.0          # was 3.0 — search 8 m radius
    loop_match_minimum_chain_size: 5           # was 10 — trigger sooner
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.25   # was 0.35 — lower acceptance threshold
    loop_match_minimum_response_fine: 0.40

    loop_search_space_dimension: 8.0           # was 3.0 — much larger search window
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ── Distance / angle variance penalty ─────────────────────────────────────
    distance_variance_penalty: 0.3            # was 0.5 — penalise distance less
    angle_variance_penalty: 0.5               # was 1.0 — penalise angle less

    # ── General ───────────────────────────────────────────────────────────────
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    # ── Serialized map saving/loading ─────────────────────────────────────────
    map_file_name: ""
    map_start_at_dock: true

    use_sim_time: true
