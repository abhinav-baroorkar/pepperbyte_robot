# EKF parameters for fusing wheel odometry (+ IMU when available)
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Wheel odometry input
    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false

    # IMU disabled for initial bring-up — uncomment when BNO055 is wired
    # and ros2_bno055 is running
    # imu0: /imu/data
    # imu0_config: [false, false, false,
    #               false, false, true,
    #               false, false, false,
    #               false, false, true,
    #               false, false, false]
    # imu0_differential: false
    # imu0_remove_gravitational_acceleration: true

    use_sim_time: false
